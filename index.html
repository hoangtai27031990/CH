<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HỆ THỐNG QUẢN LÝ HSD & ĐÁNH GIÁ – Saigon Co.op</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<!-- Thư viện bổ sung cho Đánh giá -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>

<style>
body{background:#f3f4f6;font-family:system-ui,-apple-system,sans-serif}
.card{background:#fff;border-radius:14px;box-shadow:0 4px 16px rgba(0,0,0,.08)}
.brand-bg{background:#c40018}
.brand-text{color:#c40018}
.blink30{animation:blink30 .6s linear infinite;border:2px solid #fb923c}
@keyframes blink30{0%{background:#fff3e0}50%{background:#ff9800}100%{background:#fff3e0}}
.blink20{animation:blink20 .6s linear infinite;border:2px solid #ef4444}
@keyframes blink20{0%{background:#fff1f2}50%{background:#fecaca}100%{background:#fff1f2}}
#sidebar{position:fixed;top:0;left:0;width:260px;height:100%;background:#fff;box-shadow:4px 0 16px rgba(0,0,0,.15);transform:translateX(-100%);transition:.3s;z-index:1000}
#sidebar.active{transform:translateX(0)}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;z-index:900}
#overlay.active{display:block}
.chat-box{height:420px;overflow:auto;background:#fafafa;border:1px solid #e5e7eb;border-radius:10px;padding:10px}
.chat-item{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:6px 10px;margin-bottom:6px;font-family:monospace}
#alertPopup,#checkDateBox,#trainResetConfirm,#confirmBox,#learnConfirmPopup{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:2000;display:none;align-items:center;justify-content:center}
#reader,#printReader{position:relative;width:100%;height:260px;background:#000}
.scan-frame{position:absolute;inset:10%;border:2px solid rgba(255,255,255,.4);z-index:10}
.scan-line{position:absolute;left:5%;width:90%;height:4px;background:red;box-shadow:0 0 12px red;animation:scanMove 1.2s linear infinite;z-index:20}
@keyframes scanMove{0%{top:30%}50%{top:50%}100%{top:70%}}
.toast{position:fixed;right:20px;bottom:20px;background:#2e7d32;color:white;padding:12px 18px;border-radius:8px;font-size:14px;opacity:0;transform:translateY(20px);transition:all 0.3s ease;z-index:9999;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.tool-box{display:none}
.tool-box.active{display:block}
.tool-btn{padding:10px;border-radius:8px;background:#f1f5f9;border:1px solid #e2e8f0;font-weight:500;text-align:left;transition:.2s}
.tool-btn:hover{background:#e2e8f0}
/* ===== ĐÀO TẠO & ĐÁNH GIÁ ===== */
.train-role-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:20px 12px;border-radius:14px;border:2px solid #e5e7eb;background:#fff;cursor:pointer;transition:all .2s;font-weight:600;font-size:14px;box-shadow:0 2px 8px rgba(0,0,0,.06);width:100%}
.train-role-btn:hover{border-color:#c40018;background:#fff5f5;transform:translateY(-2px)}
.train-role-icon{font-size:32px}
.train-module-item{display:flex;align-items:center;gap:12px;padding:14px;border-radius:12px;border:1.5px solid #e5e7eb;background:#fff;cursor:pointer;transition:all .2s}
.train-module-item:hover{border-color:#c40018;background:#fff8f8}
.train-module-item.done{border-color:#16a34a;background:#f0fdf4}
.train-badge{min-width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.train-badge-todo{background:#f1f5f9;color:#64748b}
.train-badge-done{background:#16a34a;color:#fff}
.train-progress-bar{height:8px;border-radius:999px;background:#e5e7eb;overflow:hidden}
.train-progress-fill{height:100%;background:linear-gradient(90deg,#c40018,#ff6b6b);border-radius:999px;transition:width .4s ease}
.pdf-viewer-wrapper{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:3000;display:none;flex-direction:column}
.pdf-viewer-header{background:#c40018;color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.score-input:focus{border-color:#c40018;background:#fff5f5;outline:none}
</style>
</head>
<body class="max-w-xl mx-auto p-3">

<!-- SIDEBAR -->
<div id="sidebar">
  <div class="p-4 border-b text-center"><div class="font-bold brand-text italic">Saigon Co.op</div></div>
  <div class="p-3 space-y-2">
    <button onclick="showMain()" class="w-full text-left px-3 py-2 rounded bg-red-50">📦 Quản lý HSD</button>
    <button onclick="showPrint()" class="w-full text-left px-3 py-2 rounded bg-slate-100">🖨 In bảng giá quầy</button>
    <button onclick="showTool()" class="w-full text-left px-3 py-2 rounded bg-slate-100">📊 Tra cứu nghiệp vụ</button>
    <button onclick="showTraining()" class="w-full text-left px-3 py-2 rounded bg-slate-100">🎓 Đào tạo thực hành</button>
    <button onclick="showEval()" class="w-full text-left px-3 py-2 rounded bg-slate-100">📝 Đánh giá học viên</button>
  </div>
</div>
<div id="overlay" onclick="toggleMenu()"></div>

<!-- HEADER -->
<div class="flex justify-between items-center mb-4 p-3 rounded-lg brand-bg text-white shadow-md">
  <div class="font-bold text-lg tracking-tight" id="headerTitle">HỆ THỐNG QUẢN LÝ HSD</div>
  <button onclick="toggleMenu()" class="text-2xl">☰</button>
</div>

<!-- ================= MAIN APP (HSD) ================= -->
<div id="mainApp" class="space-y-4">
    <div class="card p-4 space-y-3">
        <label class="font-semibold text-gray-700">Tên sản phẩm</label>
        <input id="productName" class="border p-2 rounded w-full focus:ring-2 focus:ring-red-200 outline-none" placeholder="Ví dụ: Sữa tươi Vinamilk 1L">
        
        <label class="font-semibold text-gray-700">Barcode sản phẩm</label>
        <div class="flex gap-2">
          <input id="barcode" class="border p-2 rounded w-full" placeholder="Nhập hoặc quét mã">
          <button onclick="startScan()" class="brand-bg text-white px-4 rounded active:scale-95 transition">Quét</button>
        </div>
        <div id="reader" class="hidden rounded-lg overflow-hidden"></div>

        <label class="font-semibold text-gray-700">Chọn loại tính</label>
        <select id="calcMode" class="border p-2 rounded w-full" onchange="changeCalcMode()">
          <option value="full">Có NSX & HSD</option>
          <option value="hsdBack">Chỉ có HẠN SỬ DỤNG</option>
          <option value="nsxPeriod">Chỉ có NGÀY SẢN XUẤT</option>
        </select>

        <div id="nsxBlock">
          <label class="font-semibold text-gray-700">Ngày sản xuất (NSX)</label>
          <input type="text" id="nsx" inputmode="numeric" class="border p-2 rounded w-full" placeholder="dd/mm/yyyy" oninput="dateMask(this)">
        </div>

        <div id="hsdBlock">
          <label class="font-semibold text-gray-700">Hạn sử dụng (HSD)</label>
          <input type="text" id="hsd" inputmode="numeric" class="border p-2 rounded w-full" placeholder="dd/mm/yyyy" oninput="dateMask(this)">
        </div>

        <div id="beforeHsdBlock" class="hidden">
            <label class="font-semibold text-gray-700">Thời gian trước HSD</label>
            <div class="flex gap-2">
              <input type="number" id="beforeHsdValue" class="border p-2 rounded w-1/2" placeholder="Số lượng">
              <select id="beforeHsdUnit" class="border p-2 rounded w-1/2">
                <option value="day">Ngày</option><option value="month">Tháng</option><option value="year">Năm</option>
              </select>
            </div>
        </div>

        <div id="nsxPeriodBlock" class="hidden">
            <label class="font-semibold text-gray-700">Thời gian sử dụng (từ NSX)</label>
            <div class="flex gap-2">
              <input type="number" id="periodValue" class="border p-2 rounded w-1/2" placeholder="Số lượng">
              <select id="periodUnit" class="border p-2 rounded w-1/2">
                <option value="day">Ngày</option><option value="month">Tháng</option><option value="year">Năm</option>
              </select>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-2 pt-2">
          <button onclick="calculate()" class="brand-bg text-white py-3 rounded-lg font-bold shadow-lg">TÍNH KẾT QUẢ</button>
          <button onclick="resetForm()" class="bg-gray-500 text-white py-3 rounded-lg font-bold">LÀM MỚI</button>
        </div>
        <div id="result" class="mt-2"></div>
    </div>
</div>

<!-- ================= PRINT APP ================= -->
<div id="printApp" class="hidden card p-4">
  <h2 class="font-bold brand-text mb-3">Danh sách in bảng giá</h2>
  <div class="flex gap-2 mb-3">
    <button onclick="startPrintScan()" class="brand-bg text-white px-3 py-2 rounded flex-1">📷 Quét mã</button>
    <button onclick="exportText()" class="bg-slate-700 text-white px-3 py-2 rounded flex-1">⬇ Xuất TXT</button>
    <button onclick="clearPrintHistory()" class="bg-red-600 text-white px-3 py-2 rounded">🗑 Xóa</button>

  <div class="chat-box" id="printHistory"></div>
</div>

<!-- ================= TOOL APP ================= -->
<div id="toolApp" class="hidden space-y-4">
    <div class="card p-4">
        <h2 class="font-bold brand-text mb-3 italic underline">Tra cứu nghiệp vụ nhanh</h2>
        <div id="toolMenu" class="grid grid-cols-1 gap-2">
            <button onclick="openTool('profit')" class="tool-btn">📈 Tính tỉ lệ lãi (Margin)</button>
            <button onclick="openTool('product')" class="tool-btn">🧮 Tính giá bán từ giá vốn</button>
            <button onclick="openTool('discountRisk')" class="tool-btn">⚠️ Rủi ro khi giảm giá</button>

        <button onclick="backTool()" class="text-sm text-blue-600 mb-2">← Quay lại</button>
        <h3 class="font-bold border-b pb-1">Tính tỉ lệ lãi (Margin %)</h3>
        <input id="toolCost" placeholder="Giá vốn (VND)" class="border p-2 rounded w-full" oninput="formatMoneyInput(this)">

        <select id="toolVat" class="border p-2 rounded w-full">

        </select>

<script>
/* ===== UTILS & MASK ===== */
function isIOS(){ return /iPhone|iPad|iPod/i.test(navigator.userAgent); }
function money(n){ return Math.round(Number(n)).toLocaleString("vi-VN"); }
function num(v){ return Number(String(v).replace(/\./g,"").replace(/,/g,".")) || 0; }
function formatMoneyInput(el){ el.value=el.value.replace(/[^\d]/g,''); if(!el.value) return; el.value=Number(el.value).toLocaleString("vi-VN"); }
function dateMask(el){
    let v = el.value.replace(/\D/g,'');
    if(v.length > 8) v = v.substring(0,8);
    if(v.length > 4) el.value = v.substring(0,2) + '/' + v.substring(2,4) + '/' + v.substring(4);
    else if(v.length > 2) el.value = v.substring(0,2) + '/' + v.substring(2);
    else el.value = v;
}
function parseDMY(s){
    const p = s.split('/'); if(p.length!==3) return null;
    const d=parseInt(p[0]), m=parseInt(p[1])-1, y=parseInt(p[2]);
    const date = new Date(y,m,d);
    return (date.getDate()===d && date.getMonth()===m) ? date : null;
}

/* ===== APP NAVIGATION ===== */
const apps = ['mainApp', 'printApp', 'toolApp', 'trainingApp', 'evalApp'];
function showApp(id, title){
    apps.forEach(a => document.getElementById(a).classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
    document.getElementById('headerTitle').innerText = title;
    toggleMenu();
}
function showMain(){ showApp('mainApp', 'HỆ THỐNG QUẢN LÝ HSD'); }
function showPrint(){ showApp('printApp', 'IN BẢNG GIÁ QUẦY'); renderPrint(); }
function showTool(){ showApp('toolApp', 'TRA CỨU NGHIỆP VỤ'); backTool(); }
function showTraining(){ showApp('trainingApp', 'ĐÀO TẠO THỰC HÀNH'); }
function showEval(){ showApp('evalApp', 'ĐÁNH GIÁ HỌC VIÊN'); backToEvalRole(); }
function toggleMenu(){ document.getElementById('sidebar').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); }

/* ===== HSD LOGIC ===== */
function changeCalcMode(){
    const mode = document.getElementById('calcMode').value;
    ['nsxBlock','hsdBlock','beforeHsdBlock','nsxPeriodBlock'].forEach(id => document.getElementById(id).classList.add('hidden'));
    if(mode==='full') { nsxBlock.classList.remove('hidden'); hsdBlock.classList.remove('hidden'); }
    if(mode==='hsdBack') { hsdBlock.classList.remove('hidden'); beforeHsdBlock.classList.remove('hidden'); }
    if(mode==='nsxPeriod') { nsxBlock.classList.remove('hidden'); nsxPeriodBlock.classList.remove('hidden'); }
}

function calculate(){
    const mode = document.getElementById('calcMode').value;
    let nsxD, hsdD;
    if(mode==='full'){ nsxD=parseDMY(nsx.value); hsdD=parseDMY(hsd.value); }
    else if(mode==='hsdBack'){ hsdD=parseDMY(hsd.value); nsxD=new Date(hsdD); nsxD.setDate(nsxD.getDate()-num(beforeHsdValue.value)); }
    else { nsxD=parseDMY(nsx.value); hsdD=new Date(nsxD); hsdD.setDate(hsdD.getDate()+num(periodValue.value)); }

    if(!nsxD || !hsdD || hsdD <= nsxD) { alert("Vui lòng kiểm tra lại ngày nhập!"); return; }
    
    const diff = (hsdD - nsxD) / (1000*60*60*24);
    const m30 = new Date(nsxD.getTime() + (diff * 0.7 * 86400000));
    const m20 = new Date(nsxD.getTime() + (diff * 0.8 * 86400000));
    const today = new Date(); today.setHours(0,0,0,0);

    let resHtml = `
        <div class="p-3 border rounded-lg ${today >= m30 ? 'blink30' : 'bg-green-50'} mb-2">
            <div class="font-bold">MỐC 30% (Giải tồn): ${m30.toLocaleDateString('vi-VN')}</div>
            <div class="text-sm">${today >= m30 ? '⚠️ Cần lập báo cáo giải tồn!' : '✅ Trạng thái: An toàn'}</div>
        </div>
        <div class="p-3 border rounded-lg ${today >= m20 ? 'blink20' : 'bg-green-50'}">
            <div class="font-bold">MỐC 20% (Rút hàng): ${m20.toLocaleDateString('vi-VN')}</div>

        </div>
    `;
    document.getElementById('result').innerHTML = resHtml;
}

function openEvalForm(role) {
    document.getElementById('evalRolePage').classList.add('hidden');
    document.getElementById('evalFormPage').classList.remove('hidden');
    
    const container = document.getElementById('criteriaContainer');
    container.innerHTML = evalCriteria.map(c => `
        <div class="border-l-4 border-red-600 pl-3 py-1 mb-4">
            ${c.section ? `<div class="font-black text-red-700 mb-2 uppercase text-sm">${c.section}</div>` : ''}
            <div class="font-bold text-gray-800 text-sm">${c.id}. ${c.title}</div>
            <div class="text-[11px] text-gray-500 mb-2 text-justify italic">${c.content}</div>
            <div class="flex items-center gap-3">
                <span class="text-xs font-bold text-gray-400 uppercase">Điểm (0-10):</span>
                <input type="number" min="0" max="10" placeholder="0" 
                    id="score_${c.id}" class="score-input border-b-2 border-gray-300 w-16 text-center font-black text-red-600 bg-transparent"
                    oninput="updateTotalWeightedScore()">
            </div>
        </div>
    `).join('');

    setTimeout(() => {
        const canvas = document.getElementById('signature-pad');
        signaturePad = new SignaturePad(canvas);
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
    }, 200);
}

function updateTotalWeightedScore(){
    let total = 0;
    evalCriteria.forEach(c => {
        const s = parseFloat(document.getElementById(`score_${c.id}`).value) || 0;
        total += s * c.weight;
    });
    document.getElementById('totalWeightedScore').innerText = total.toFixed(2);
}

function backToEvalRole(){ document.getElementById('evalFormPage').classList.add('hidden'); document.getElementById('evalRolePage').classList.remove('hidden'); }

async function exportEvalToPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const name = document.getElementById('ev_name').value || "Hoc_vien";
    
    // Header & Title
    doc.setFontSize(10);
    doc.text("Lien hiep HTX TM Tp. Ho Chi Minh", 15, 15);
    doc.text("Trung tam Huan luyen Nghiep vu", 15, 20);
    doc.text("DGTT: CF-NVBH", 160, 15);

    doc.setFontSize(14);
    doc.text("PHIEU DANH GIA KET QUA DAO TAO THUC HANH", 105, 35, { align: "center" });

    // Thông tin chung
    doc.setFontSize(10);
    doc.text(`Ho ten: ${name}`, 15, 45);
    doc.text(`Ma so HV: ${document.getElementById('ev_ms').value}`, 120, 45);
    doc.text(`Ngay danh gia: ${document.getElementById('ev_date').value}`, 15, 52);
    doc.text(`Don vi: ${document.getElementById('ev_unit').value}`, 120, 52);

    // Bảng điểm
    let body = evalCriteria.map(c => {
        const s = document.getElementById(`score_${c.id}`).value || 0;
        return [c.id, c.title, `${c.weight*100}%`, s, (s*c.weight).toFixed(2)];
    });
    body.push([{ content: 'TONG DIEM QUY DOI', colSpan: 4, styles: { halign: 'right', fontStyle: 'bold' } }, { content: document.getElementById('totalWeightedScore').innerText, styles: { fontStyle: 'bold' } }]);

    doc.autoTable({
        startY: 60,
        head: [['STT', 'Tieu chi danh gia', 'Ty trong', 'Diem(0-10)', 'Quy doi']],
        body: body,
        theme: 'grid',
        styles: { fontSize: 8 }
    });

    const finalY = doc.lastAutoTable.finalY + 10;
    doc.text("NHAN XET NGUOI HUONG DAN:", 15, finalY);
    doc.setFontSize(9);
    doc.text(document.getElementById('ev_comment').value || "....................................................", 15, finalY + 7, { maxWidth: 180 });

    // Chữ ký
    if (!signaturePad.isEmpty()) {
        const sig = signaturePad.toDataURL();
        doc.addImage(sig, 'PNG', 140, finalY + 15, 40, 20);
    }
    doc.text("Nguoi huong dan ky ten", 150, finalY + 15, { align: 'center' });
    doc.text(document.getElementById('ev_evaluator').value, 150, finalY + 40, { align: 'center' });

    doc.save(`Phieu_Danh_Gia_${name}.pdf`);
    showToast("Đã xuất file PDF thành công!");
}
