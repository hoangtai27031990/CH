<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HỆ THỐNG QUẢN LÝ TỔNG HỢP – Saigon Co.op</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
<style>
body{background:#f3f4f6;font-family:system-ui,-apple-system,sans-serif}
.card{background:#fff;border-radius:14px;box-shadow:0 4px 16px rgba(0,0,0,.08)}
.brand-bg{background:#c40018}
.brand-text{color:#c40018}
.blink30{animation:blink30 .6s linear infinite;border:2px solid #fb923c}
@keyframes blink30{0%{background:#fff3e0}50%{background:#ff9800}100%{background:#fff3e0}}
.blink20{animation:blink20 .6s linear infinite;border:2px solid #ef4444}
@keyframes blink20{0%{background:#fff1f2}50%{background:#fecaca}100%{background:#fff1f2}}
#sidebar{position:fixed;top:0;left:0;width:260px;height:100%;background:#fff;box-shadow:4px 0 16px rgba(0,0,0,.15);transform:translateX(-100%);transition:.3s;z-index:1000}
#sidebar.active{transform:translateX(0)}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;z-index:900}
#overlay.active{display:block}
.chat-box{height:420px;overflow:auto;background:#fafafa;border:1px solid #e5e7eb;border-radius:10px;padding:10px}
.chat-item{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:6px 10px;margin-bottom:6px;font-family:monospace}
.filter-btn{padding:6px 12px;border-radius:6px;border:1px solid #ddd;background:#f5f5f5;cursor:pointer;font-size:13px}
.filter-btn.active{background:#2563eb;color:white;border-color:#2563eb}
#reader,#printReader{position:relative;width:100%;height:260px;background:#000}
.train-role-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:20px 12px;border-radius:14px;border:2px solid #e5e7eb;background:#fff;cursor:pointer;transition:all .2s;font-weight:600;font-size:14px;box-shadow:0 2px 8px rgba(0,0,0,.06);width:100%}
.train-role-btn:hover{border-color:#c40018;background:#fff5f5;transform:translateY(-2px)}
.train-module-item{display:flex;align-items:center;gap:12px;padding:14px;border-radius:12px;border:1.5px solid #e5e7eb;background:#fff;cursor:pointer;transition:all .2s}
.train-module-item.done{border-color:#16a34a;background:#f0fdf4}
.train-badge{min-width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.train-badge-todo{background:#f1f5f9;color:#64748b}
.train-badge-done{background:#16a34a;color:#fff}
.train-progress-bar{height:8px;border-radius:999px;background:#e5e7eb;overflow:hidden}
.train-progress-fill{height:100%;background:linear-gradient(90deg,#c40018,#ff6b6b);border-radius:999px;transition:width .4s ease}
.pdf-viewer-wrapper{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:3000;display:flex;flex-direction:column;}
.pdf-viewer-header{background:#c40018;color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#signature-pad { border: 1px solid #ccc; background: #fff; width: 100%; height: 180px; touch-action: none; border-radius: 8px; }
.eval-table { width: 100%; border-collapse: collapse; font-size: 11px; }
.eval-table th, .eval-table td { border: 1px solid #000; padding: 5px; vertical-align: top; }
.score-input { width: 40px; text-align: center; border: 1px solid #333; font-weight: bold; }
.tool-box{display:none}
.tool-box.active{display:block}
.tool-btn{padding:10px;border-radius:8px;background:#f1f5f9;border:1px solid #e2e8f0;font-weight:500;text-align:left;transition:.2s}
.toast{position:fixed;right:20px;bottom:20px;background:#2e7d32;color:white;padding:12px 18px;border-radius:8px;font-size:14px;opacity:0;transform:translateY(20px);transition:all 0.3s ease;z-index:9999;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.stat-card{border-radius:10px;padding:10px 12px;text-align:center;flex:1;min-width:70px}
</style>
</head>
<body class="max-w-xl mx-auto p-3">

<!-- SIDEBAR -->
<div id="sidebar">
  <div class="p-4 border-b text-center"><div class="font-bold brand-text italic">Saigon Co.op</div></div>
  <div class="p-3 space-y-2">
    <button onclick="showMain()" class="w-full text-left px-3 py-2 rounded bg-slate-100">📦 Quản lý HSD</button>
    <button onclick="showPrint()" class="w-full text-left px-3 py-2 rounded bg-slate-100">🖨 In bảng giá quầy</button>
    <button onclick="showTool()" class="w-full text-left px-3 py-2 rounded bg-slate-100">📊 Tra cứu nghiệp vụ</button>
    <button onclick="showTraining()" class="w-full text-left px-3 py-2 rounded bg-slate-100">🎓 Đào tạo thực hành</button>
    <button onclick="showEval()" class="w-full text-left px-3 py-2 rounded bg-red-50 font-bold">📝 Đánh giá học viên</button>
  </div>
</div>
<div id="overlay" onclick="toggleMenu()"></div>

<!-- HEADER -->
<div class="flex justify-between items-center mb-4 p-3 rounded-lg brand-bg text-white shadow-lg">
  <div class="font-bold text-lg" id="headerTitle">HỆ THỐNG QUẢN LÝ HSD</div>
  <button onclick="toggleMenu()" class="text-2xl">☰</button>
</div>

<!-- ================= 1. QUẢN LÝ HSD ================= -->
<div id="mainApp" class="space-y-4">
  <div class="card p-4 space-y-3">
    <label class="font-semibold">Tên sản phẩm</label>
    <input id="productName" class="border p-2 rounded w-full" placeholder="Ví dụ: Sữa tươi Vinamilk 1L">
    <label class="font-semibold">Barcode sản phẩm</label>
    <div class="flex gap-2"><input id="barcode" class="border p-2 rounded w-full"><button onclick="startScan()" class="brand-bg text-white px-3 rounded">Quét</button></div>
    <div id="reader" class="hidden"></div>
    <select id="calcMode" class="border p-2 rounded w-full" onchange="changeCalcMode()">
      <option value="full">Có NSX & HSD</option><option value="hsdBack">Chỉ có HẠN SỬ DỤNG</option><option value="nsxPeriod">Chỉ có NGÀY SẢN XUẤT</option>
    </select>
    <div id="nsxBlock"><label class="font-semibold">Ngày sản xuất (NSX)</label><input type="text" id="nsx" inputmode="numeric" maxlength="10" class="border p-2 rounded w-full" placeholder="nn/mm/yyyy" oninput="dateMask(this)"></div>
    <div id="hsdBlock"><label class="font-semibold">Hạn sử dụng (HSD)</label><input type="text" id="hsd" inputmode="numeric" maxlength="10" class="border p-2 rounded w-full" placeholder="nn/mm/yyyy" oninput="dateMask(this)"></div>
    <div id="beforeHsdBlock" class="hidden"><label class="font-semibold">Thời gian trước HSD</label><div class="flex gap-2"><input type="number" id="beforeHsdValue" class="border p-2 rounded w-1/2"><select id="beforeHsdUnit" class="border p-2 rounded w-1/2"><option value="day">Ngày</option><option value="month">Tháng</option></select></div></div>
    <div id="nsxPeriodBlock" class="hidden"><label class="font-semibold">Thời gian sử dụng từ NSX</label><div class="flex gap-2"><input type="number" id="periodValue" class="border p-2 rounded w-1/2"><select id="periodUnit" class="border p-2 rounded w-1/2"><option value="day">Ngày</option><option value="month">Tháng</option></select></div></div>
    <button onclick="calculate()" class="w-full brand-bg text-white py-2 rounded font-bold">TÍNH KẾT QUẢ</button>
    <div id="result"></div>
  </div>
</div>

<!-- ================= 2. ĐÁNH GIÁ HỌC VIÊN (Staff) ================= -->
<div id="evalApp" class="hidden space-y-4 pb-10">
  <div id="evalRoleSelector" class="card p-4">
    <h2 class="font-bold brand-text mb-4 text-center">CHỌN BIỂU MẪU ĐÁNH GIÁ</h2>
    <div class="grid grid-cols-2 gap-3">
      <button class="train-role-btn" onclick="openEval('staff')"><span class="train-role-icon">🛒</span><span>Nhân viên bán hàng</span></button>
      <button class="train-role-btn" onclick="alert('Đang cập nhật...')"><span class="train-role-icon">👔</span><span>Cửa hàng trưởng</span></button>
    </div>
  </div>

  <div id="evalForm" class="hidden card p-3">
    <button onclick="backToRoleSelector()" class="text-blue-600 mb-2">← Quay lại</button>
    <h2 class="font-bold text-center text-red-700 text-lg">PHIẾU ĐÁNH GIÁ KẾT QUẢ ĐÀO TẠO THỰC HÀNH</h2>
    
    <div class="space-y-1 mb-3 text-[11px]">
      <div class="flex gap-2"><span>Họ tên:</span><input id="ev_name" class="border-b w-full outline-none"><span>Mã số HV:</span><input id="ev_ms" class="border-b w-full outline-none"></div>
      <div class="flex gap-2"><span>Chức danh:</span><input id="ev_pos" value="Nhân viên bán hàng" class="border-b w-full outline-none"><span>Ngày:</span><input type="date" id="ev_date" class="border-b outline-none"></div>
      <div class="flex gap-2"><span>Đơn vị công tác:</span><input id="ev_unit" class="border-b w-full outline-none"></div>
    </div>

    <div class="overflow-x-auto">
      <table class="eval-table" id="evalTable">
        <thead><tr class="bg-gray-100"><th>STT</th><th>NỘI DUNG</th><th>ĐIỂM CHUẨN</th><th>TỶ TRỌNG</th><th>ĐIỂM (0-10)</th></tr></thead>
        <tbody id="evalTableBody">
          <!-- Các tiêu chí sẽ được render bằng JS để đảm bảo văn bản đầy đủ -->
        </tbody>
      </table>
    </div>

    <div class="mt-4 space-y-3">
      <div><label class="font-bold text-xs text-red-700">Ghi chú: Cần ghi rõ lý do chấm điểm < 6 và hướng khắc phục</label><textarea id="ev_note" class="w-full border rounded p-2 text-xs h-16"></textarea></div>
      <div class="grid grid-cols-1 gap-4 border p-2 rounded bg-gray-50">
        <div class="text-center">
            <label class="font-bold text-sm block mb-1">Người hướng dẫn ký tên</label>
            <canvas id="signature-pad" class="border bg-white rounded shadow-inner"></canvas>
            <button onclick="clearSig()" class="text-[10px] text-red-600 mt-1 underline">Xóa chữ ký</button>
        </div>
        <div class="flex flex-col gap-1">
            <label class="font-bold text-sm">Họ tên người đánh giá:</label>
            <input id="ev_evaluator_name" class="border p-2 rounded w-full font-bold uppercase" placeholder="Nhập tên người hướng dẫn">
        </div>
      </div>
      <button onclick="exportEvalToWord()" class="w-full brand-bg text-white py-3 rounded-lg font-bold shadow-lg mt-4">XUẤT FILE WORD (.DOC)</button>
    </div>
    
    <!-- Footer cho file -->
    <div class="text-[9px] mt-4 flex justify-between border-t pt-2 text-gray-500">
      <span>BM-74.TTHLNV</span>
      <span>Ban hành lần: 03</span>
      <span>Trang 1/4</span>
    </div>
  </div>
</div>

<!-- ================= 3. IN BẢNG GIÁ ================= -->
<div id="printApp" class="hidden card p-4">
  <h2 class="font-bold brand-text mb-3">In bảng giá quầy</h2>
  <div class="flex gap-2 mb-2"><button onclick="startPrintScan()" class="brand-bg text-white px-3 py-2 rounded">📷 Quét mã</button><button onclick="exportText()" class="bg-slate-700 text-white px-3 py-2 rounded">⬇ Xuất TXT</button><button onclick="clearPrintHistory()" class="bg-red-600 text-white px-3 py-2 rounded">🗑 Xóa</button></div>
  <div id="printReader" class="hidden rounded mb-3"></div>
  <div class="chat-box" id="printHistory"></div>
</div>

<!-- ================= 4. TRA CỨU NGHIỆP VỤ ================= -->
<div id="toolApp" class="hidden space-y-4">
  <div class="card p-4"><h2 class="font-bold brand-text mb-3">Tra cứu nghiệp vụ</h2><div id="toolMenu" class="grid grid-cols-1 gap-2"><button onclick="openTool('profit')" class="tool-btn">📈 Tính tỉ lệ lãi</button><button onclick="openTool('product')" class="tool-btn">🧮 Tính giá bán</button></div></div>
  <div id="toolProfit" class="tool-box card p-4 space-y-2"><button onclick="backTool()" class="text-sm text-blue-600">← Quay lại</button><h3>Tính lãi</h3><input id="toolCost" placeholder="Giá vốn" class="border p-2 rounded w-full" oninput="formatMoneyInput(this)"><input id="toolPrice" placeholder="Giá bán" class="border p-2 rounded w-full" oninput="formatMoneyInput(this)"><button onclick="calcProfit()" class="brand-bg text-white py-2 rounded w-full">TÍNH</button><div id="profitResult"></div></div>
</div>

<!-- ================= 5. ĐÀO TẠO THỰC HÀNH ================= -->
<div id="trainingApp" class="hidden space-y-4">
  <div id="trainRolePage" class="card p-4"><h2 class="font-bold brand-text mb-1 text-center">ĐÀO TẠO NGHIỆP VỤ</h2><div class="grid grid-cols-1 gap-3 mt-4"><button class="train-role-btn" onclick="showTrainRole('manager')"><span class="train-role-icon">👔</span><span>Lộ trình Cửa hàng trưởng</span></button></div></div>
  <div id="trainManagerPage" class="hidden space-y-4"><div class="card p-4"><button onclick="backToRolePage()" class="text-blue-600">← Quay lại</button><div id="trainModuleList1" class="space-y-2 mt-4"></div><div id="trainModuleList" class="space-y-2 mt-4"></div></div></div>
</div>

<div id="toastBox" class="toast"></div>

<!-- PDF VIEWER -->
<div id="pdfViewer" class="pdf-viewer-wrapper" style="display:none">
  <div class="pdf-viewer-header"><span id="pdfViewerTitle" class="font-bold"></span><button onclick="closePdfViewer()" class="text-2xl">&times;</button></div>
  <div id="pdfCanvasArea" class="flex-1 overflow-auto bg-gray-800"><div id="pdfPagesContainer" class="flex flex-col items-center gap-2 p-2"></div></div>
  <div class="bg-white p-3"><button id="btnConfirmLearn" onclick="showLearnConfirm()" class="w-full brand-bg text-white py-3 rounded-lg font-bold">TÔI ĐÃ ĐỌC XONG</button></div>
</div>

<script>
/* ===== CORE APP LOGIC ===== */
function toggleMenu(){ document.getElementById("sidebar").classList.toggle("active"); document.getElementById("overlay").classList.toggle("active"); }
function hideAll(){ ["mainApp","evalApp","printApp","toolApp","trainingApp"].forEach(id => document.getElementById(id).classList.add("hidden")); }

function showMain(){ hideAll(); document.getElementById("mainApp").classList.remove("hidden"); headerTitle.innerText="QUẢN LÝ HSD"; toggleMenu(); }
function showEval(){ hideAll(); document.getElementById("evalApp").classList.remove("hidden"); headerTitle.innerText="ĐÁNH GIÁ HỌC VIÊN"; toggleMenu(); renderEvalTable(); }
function showPrint(){ hideAll(); document.getElementById("printApp").classList.remove("hidden"); headerTitle.innerText="IN BẢNG GIÁ"; toggleMenu(); }
function showTool(){ hideAll(); document.getElementById("toolApp").classList.remove("hidden"); headerTitle.innerText="TRA CỨU NGHIỆP VỤ"; toggleMenu(); }
function showTraining(){ hideAll(); document.getElementById("trainingApp").classList.remove("hidden"); headerTitle.innerText="ĐÀO TẠO THỰC HÀNH"; toggleMenu(); }

/* ===== EVALUATION LOGIC (11 Criteria) ===== */
const evalCriteria = [
  {id:1, text:"<b>Kiểm tra hạn sử dụng:</b><br>- Kiểm tra hạn sử dụng đủ điều kiện kinh doanh.", weight:0.1},
  {id:2, text:"<b>Bổ sung hàng ra quầy và loại bỏ hàng không phù hợp:</b><br>- Xác định mặt hàng cần bổ sung.<br>- Đảm bảo hàng đầy đủ và không có hàng cận hạn sử dụng, hết hạn sử dụng trên quầy kệ.<br>- Kiểm soát và bảo quản hàng đổi/trả nhà cung cấp.<br>- Loại bỏ hàng không phù hợp (hàng kém chất lượng, hư hỏng, rách bao bì...) ra khỏi quầy, ghi nhận đúng biểu mẫu và lưu trữ hàng đúng nơi quy định.<br>- Lập phiếu đề xuất hủy hàng đảm bảo tính chính xác trong ngày phát sinh.", weight:0.1},
  {id:3, text:"<b>Kiểm nhận hàng hoá và thực hiện chất xếp hàng hóa trong kho:</b><br>- Kiểm tra hóa đơn chứng từ đảm bảo chính xác.<br>- Thực hiện đối chiếu hóa đơn chứng từ.<br>- Kiểm tra hàng hoá đầu vào (số lượng, chất lượng, quy cách, nhiệt độ hàng trữ đông/mát, nhãn hàng hoá...).<br>- Ký nhận hóa đơn và ghi nhận biểu mẫu theo quy định.<br>- Đảm bảo nguyên tắc chất xếp hàng hóa trong kho: khoảng cách chất xếp, theo định vị...<br>- Thực hiện xếp hàng hóa tại kho theo đúng quy định ở một số nhóm hàng cơ bản: nui mì, sữa, nước giải khát...", weight:0.1},
  {id:4, text:"<b>Trưng bày hàng hóa:</b><br>- Kiểm tra hàng hóa trước khi trưng bày lên quầy (bao bì, hạn sử dụng).<br>- Thực hiện trưng bày theo đúng nguyên tắc và kỹ thuật trưng bày (line hàng, ụ KM), nguyên tắc 1 chiều tại khu vực tủ mát/tủ đông.<br>- Thực hiện dàn hàng đúng qui định.<br>- Kiểm tra bảng giá, bảng khuyến mãi (loại bỏ bảng khuyến mãi hết hạn).", weight:0.1},
  {id:5, text:"<b>Kiến thức hàng hóa và tư vấn bán hàng:</b><br>- Nắm đặc tính, công dụng của ngành hàng thực phẩm công nghệ và phi thực phẩm và vận dụng để tư vấn, lựa chọn hàng hóa cho khách.<br>- Chủ động tiếp xúc, tư vấn khách hàng.<br>- Nắm bắt các chương trình khuyến mãi để giới thiệu cho khách hàng và tư vấn bán thêm, bán chéo để gia tăng doanh số.", weight:0.1},
  {id:6, text:"<b>Nghiệp vụ thu ngân:</b><br>- Thực hiện các công việc đầu ca, cuối ca làm việc của nhân viên thu ngân: công tác chuẩn bị tại quầy thu ngân, nhận tiền lẻ từ TQHC, thực hiện kê tiền bán hàng tại cash và nộp tiền đúng theo quy định....<br>- Thực hiện các bước tính tiền và trả tiền thừa cho khách hàng theo quy định để đảm bảo tiền hàng.<br>- Lựa chọn bao bì phù hợp và đóng gói hàng hóa theo đúng quy định (nặng lớn ở dưới, nhẹ nhỏ ở trên; đảm bảo tính thương phẩm của hàng hóa; đóng gói tách biệt các mặt hàng TPTS dễ bị chảy dịch...)", weight:0.1},
  {id:7, text:"<b>Chương trình tính tiền:</b><br>- Thực hiện chức năng cơ bản của chương trình tính tiền TOPOS: nhập mã thẻ khách hàng (Quét mã thẻ, số điện thoại); nhập mã hàng hóa; phân biệt được mã lốc mã lẻ hàng hóa; các chức năng cơ bản thường sử dụng: tính số lượng, in lại hóa đơn...<br>- Thực hiện các hình thức thanh toán tại cửa hàng thường sử dụng: tiền mặt; PMH; thẻ ngân hàng; Momo...<br>- Giải quyết các tình huống trong quá trình tính tiền tại quầy thu ngân.", weight:0.1},
  {id:8, text:"<b>Thực hiện sơ chế biến:</b><br>- Thực hiện sơ chế các sản phẩm theo đúng quy định, các sản phẩm theo công thức Setcode, điều chỉnh tồn kho.<br>- Thao tác sơ chế, đóng gói màng co gọn gàng, căng và đẹp.<br>- Đảm bảo tuân thủ bảo hộ lao động trong quá trình làm việc và khi sơ chế biến.<br>- Sử dụng vật dụng/dụng cụ theo màu sắc quy định.<br>- Tuân thủ nguyên tắc 1 chiều trong khu vực sơ chế biến, trưng bày.", weight:0.1},
  {id:9, text:"<b>Cân hàng và bảo quản xử lý hàng tồn TPTS cuối ngày:</b><br>- Thuộc mã cân hàng thực phẩm tươi sống: rau, củ, quả, thủy hải sản...<br>- Cân và dán tem chính xác hàng TPTS.<br>- Phân loại và xử lý hàng tồn đúng quy định.<br>- Bảo quản hàng hóa phù hợp với từng nhóm hàng.", weight:0.05},

let signaturePad;
function initSig() {
  const canvas = document.getElementById("signature-pad");
  signaturePad = new SignaturePad(canvas);
  const ratio = Math.max(window.devicePixelRatio || 1, 1);
  canvas.width = canvas.offsetWidth * ratio; canvas.height = canvas.offsetHeight * ratio;
  canvas.getContext("2d").scale(ratio, ratio);
}
function clearSig(){ if(signaturePad) signaturePad.clear(); }

function renderEvalTable() {
  const tbody = document.getElementById("evalTableBody");
  tbody.innerHTML = evalCriteria.map(c => `
    <tr><td class="text-center">${c.id}</td><td>${c.text}</td><td class="text-center">10</td><td class="text-center">${c.weight*100}%</td><td><input type="number" class="score-input" data-w="${c.weight}" onchange="updateTotalEval()"></td></tr>
  `).join("");
  initSig();
}

function updateTotalEval() {
  let total = 0;
  document.querySelectorAll(".score-input").forEach(i => total += (parseFloat(i.value)||0) * parseFloat(i.getAttribute("data-w")));
  document.getElementById("totalEvalResult").innerText = total.toFixed(2);
}

function openEval(role){ document.getElementById("evalRoleSelector").classList.add("hidden"); document.getElementById("evalForm").classList.remove("hidden"); }
function backToRoleSelector(){ document.getElementById("evalForm").classList.add("hidden"); document.getElementById("evalRoleSelector").classList.remove("hidden"); }

/* ===== CORE HSD LOGIC (GIỮ NGUYÊN) ===== */
function dateMask(el){ let v=el.value.replace(/\D/g,''); if(v.length>8)v=v.substring(0,8); if(v.length<=2)el.value=v; else if(v.length<=4)el.value=v.substring(0,2)+'/'+v.substring(2); else el.value=v.substring(0,2)+'/'+v.substring(2,4)+'/'+v.substring(4); }
function num(v){ return Number(String(v).replace(/\./g,"")) || 0; }
function calculate(){
  const m=calcMode.value; let nsxD, hsdD;
  const pNsx=document.getElementById("nsx").value, pHsd=document.getElementById("hsd").value;
  if(m==='full'){ nsxD=parseDMY(pNsx); hsdD=parseDMY(pHsd); }
  else if(m==='hsdBack'){ hsdD=parseDMY(pHsd); nsxD=new Date(hsdD); nsxD.setDate(nsxD.getDate()-num(beforeHsdValue.value)); }
  else { nsxD=parseDMY(pNsx); hsdD=new Date(nsxD); hsdD.setDate(hsdD.getDate()+num(periodValue.value)); }
  if(!nsxD||!hsdD||isNaN(nsxD)||isNaN(hsdD)){alert("Ngày nhập sai!");return;}
  const diff=(hsdD-nsxD)/86400000, m30=new Date(nsxD.getTime()+diff*0.7*86400000), m20=new Date(nsxD.getTime()+diff*0.8*86400000), today=new Date(); today.setHours(0,0,0,0);
  result.innerHTML=`<div class="p-3 border rounded mb-2 ${today>=m30?'blink30':''}">Mốc 30%: ${m30.toLocaleDateString('vi-VN')}</div><div class="p-3 border rounded ${today>=m20?'blink20':''}">Mốc 20%: ${m20.toLocaleDateString('vi-VN')}</div>`;
}
function parseDMY(s){ const p=s.split('/'); return new Date(p[2],p[1]-1,p[0]); }
function changeCalcMode(){ ["nsxBlock","hsdBlock","beforeHsdBlock","nsxPeriodBlock"].forEach(id=>document.getElementById(id).classList.add("hidden")); const m=calcMode.value; if(m==='full'){nsxBlock.classList.remove("hidden");hsdBlock.classList.remove("hidden");} else if(m==='hsdBack'){hsdBlock.classList.remove("hidden");beforeHsdBlock.classList.remove("hidden");} else {nsxBlock.classList.remove("hidden");nsxPeriodBlock.classList.remove("hidden");} }
function formatMoneyInput(el){ let v=el.value.replace(/\D/g,''); el.value=v?Number(v).toLocaleString("vi-VN"):''; }
